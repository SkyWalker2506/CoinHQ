name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coinhq_test
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: cd backend && uv sync --all-extras
      - name: Lint
        run: cd backend && uv run ruff check .
      - name: Security audit
        run: cd backend && uv run pip-audit
        continue-on-error: true  # warn only, don't fail CI for now
      - name: Test
        run: cd backend && uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/coinhq_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-32-characters!!

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with: {version: 8}
      - uses: actions/setup-node@v6
        with: {node-version: 20, cache: pnpm, cache-dependency-path: frontend/pnpm-lock.yaml}
      - name: Install
        run: cd frontend && pnpm install
      - name: Lint
        run: cd frontend && pnpm lint
      - name: Build
        run: cd frontend && pnpm build
